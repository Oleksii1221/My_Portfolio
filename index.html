<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Портфоліо Олексія Медвідя: застосунки, боти, електроніка та вебпроєкти."
    />
    <title>Олексій Медвідь - Портфоліо</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="На початок сторінки">OM</a>
      <a class="github-link" href="https://github.com/Oleksii1221" target="_blank" rel="noreferrer">
        GitHub
        <span aria-hidden="true">↗</span>
      </a>
    </header>

    <main id="top">
      <section class="intro" aria-labelledby="page-title">
        <div class="portrait-wrap">
          <img src="https://github.com/Oleksii1221.png?size=256" alt="Олексій Медвідь" class="portrait" />
          <span class="availability">Відкритий до співпраці</span>
        </div>
        <div class="intro-copy">
          <p class="eyebrow">Портфоліо 2026</p>
          <h1 id="page-title">Олексій Медвідь</h1>
          <p class="lead">Застосунки, боти, електроніка та вебпроєкти, які хочеться не лише показати, а й запустити.</p>
        </div>
      </section>

      <section class="projects-section" aria-labelledby="projects-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Вибрані роботи</p>
            <h2 id="projects-title">Публічні проєкти</h2>
          </div>
          <p id="project-count" class="project-count"></p>
        </div>
        <div id="projects" class="project-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Зроблено Олексієм Медвідем</p>
      <a href="https://github.com/Oleksii1221" target="_blank" rel="noreferrer">Переглянути GitHub <span aria-hidden="true">↗</span></a>
    </footer>

    <template id="project-template">
      <article class="project-card">
        <a class="card-link" target="_blank" rel="noreferrer">
          <div class="project-visual">
            <img class="project-image" loading="lazy" alt="" />
            <div class="visual-shade"></div>
            <span class="status"></span>
          </div>
          <div class="project-content">
            <div class="project-title-row">
              <h3></h3>
              <span class="repo-arrow" aria-hidden="true">↗</span>
            </div>
            <p class="project-description"></p>
            <div class="project-meta">
              <span class="project-role"></span>
              <span class="project-language"></span>
            </div>
          </div>
        </a>
        <a class="live-link" target="_blank" rel="noreferrer" hidden>
          <span>Відкрити сайт</span>
          <span aria-hidden="true">↗</span>
        </a>
      </article>
    </template>
    <script src="projects.js"></script>
  </body>
</html>
