<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Портфоліо Oleksii Medvid: desktop apps, bots, embedded systems, Android/APK tools and product ecosystems explained простою мовою."
    />
    <meta name="author" content="Oleksii Medvid" />
    <meta name="theme-color" content="#f5f7fb" />
    <link rel="canonical" href="https://oleksii1221.github.io/My_Portfolio/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oleksii Medvid Portfolio" />
    <meta property="og:title" content="Oleksii Medvid - apps, bots and embedded tools" />
    <meta
      property="og:description"
      content="Проєкти Oleksii Medvid: зручні застосунки, Telegram/Discord bots, ESP32/Arduino системи та продуктові екосистеми."
    />
    <meta property="og:url" content="https://oleksii1221.github.io/My_Portfolio/" />
    <meta property="og:image" content="https://oleksii1221.github.io/My_Portfolio/assets/social-preview.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oleksii Medvid - portfolio" />
    <meta
      name="twitter:description"
      content="Desktop apps, bots, embedded systems, Android/APK tools and product ecosystems."
    />
    <meta name="twitter:image" content="https://oleksii1221.github.io/My_Portfolio/assets/social-preview.svg" />
    <title>Oleksii Medvid - apps, bots and embedded tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="github-link" href="https://github.com/Oleksii1221" target="_blank" rel="noreferrer">
        GitHub
        <span aria-hidden="true">↗</span>
      </a>
    </header>

    <main id="top">
      <section class="intro" aria-labelledby="page-title">
        <div class="portrait-wrap">
          <img src="https://github.com/Oleksii1221.png?size=256" alt="Oleksii Medvid" class="portrait" />
        </div>
        <div class="intro-copy">
          <p class="eyebrow">Портфоліо 2026</p>
          <h1 id="page-title">Oleksii Medvid</h1>
          <p class="role-line">Будую desktop apps, bots, embedded systems та продуктові екосистеми, які можна не тільки показати, а й реально запустити.</p>
        </div>
      </section>

      <section class="projects-section" aria-label="Проєкти">
        <p id="project-count" class="project-count"></p>
        <div id="projects" class="project-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Зроблено Oleksii Medvid</p>
      <a href="https://github.com/Oleksii1221" target="_blank" rel="noreferrer">Переглянути GitHub <span aria-hidden="true">↗</span></a>
    </footer>

    <template id="project-template">
      <article class="project-card">
        <a class="card-link" target="_blank" rel="noreferrer">
          <div class="project-visual">
            <div class="visual-pattern" aria-hidden="true"></div>
            <img class="project-image" loading="eager" alt="" />
            <span class="project-mark" aria-hidden="true"></span>
            <div class="visual-shade"></div>
            <span class="status"></span>
          </div>
          <div class="project-content">
            <div class="project-title-row">
              <h3></h3>
              <span class="repo-arrow" aria-hidden="true">↗</span>
            </div>
            <p class="project-description"></p>
            <div class="project-meta"></div>
          </div>
        </a>
        <a class="live-link" target="_blank" rel="noreferrer" hidden>
          <span>Відкрити проєкт</span>
          <span aria-hidden="true">↗</span>
        </a>
      </article>
    </template>
    <script src="projects.js"></script>
  </body>
</html>
